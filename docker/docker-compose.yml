version: '3.8'
 
services:
  # 1. MySQL
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: "PFE-database"
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user_pfe
      MYSQL_PASSWORD: user_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/1.sql
    networks:
      - pfe-network
    # ── This is the key fix: tell Docker how to know MySQL is truly ready ──
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "user_pfe", "-puser_password"]
      interval: 5s      # check every 5 seconds
      timeout: 5s       # fail if no response in 5s
      retries: 10       # try 10 times before giving up (~50s total)
      start_period: 20s # give MySQL 20s to initialize before checking
 
  # 2. Python AI Service
  ai_service:
    build:
      context: ../ai_service
      dockerfile: Dockerfile
    container_name: ai_recommendation
    restart: always
    ports:
      - "5005:5005"
    environment:
      - DB_HOST=db
      - DB_USER=user_pfe
      - DB_PASSWORD=user_password
      - DB_NAME=PFE-database
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    volumes:
      - ../ai_service:/app
    depends_on:
      db:
        condition: service_healthy   # ← waits until MySQL healthcheck passes
    networks:
      - pfe-network
 
  # 3. Node.js Backend
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: node_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ../backend-api/.env
    environment:
      DB_HOST: db
      DB_USER: user_pfe
      DB_PASSWORD: user_password
      DB_NAME: "PFE-database"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../backend-api:/app
      - /app/node_modules
      - ../backend-api/uploads:/app/uploads
    command: npm run dev
    depends_on:
      db:
        condition: service_healthy   # ← waits until MySQL healthcheck passes
    networks:
      - pfe-network
 
networks:
  pfe-network:
    driver: bridge
 
volumes:
  db_data: